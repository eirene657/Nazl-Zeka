    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #2a2a2a;
            --accent-primary: #5b7ce8;
        }

        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --border-color: #d0d0d0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .container {
            background: var(--bg-secondary);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .header {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            opacity: 0.7;
            color: var(--text-secondary);
            margin: 0;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--bg-secondary);
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        .user-message .text {
            background: var(--accent-primary);
            color: white;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 8px rgba(91, 124, 232, 0.3);
        }

        .ai-message .text {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            border-bottom-left-radius: 5px;
            line-height: 1.4;
            border: 1px solid var(--border-color);
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 150px;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4a6bcf 100%);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(91, 124, 232, 0.3);
            white-space: nowrap;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(91, 124, 232, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .stats-widget, .quote-widget {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        .stats-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .stat-item {
            color: var(--text-primary);

        }

            padding: 12px;

            border-radius: 5px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        // ÇIFT İSTATISTIKLERİ
        function calculateDateDifference(startDate, endDate) {
            const oneDay = 1000 * 60 * 60 * 24;
            const adjustedStart = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            const adjustedEnd = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
            if (adjustedEnd < adjustedStart) {
                return { totalDays: 0, years: 0, months: 0, days: 0 };
            }

            let years = adjustedEnd.getFullYear() - adjustedStart.getFullYear();
            let months = adjustedEnd.getMonth() - adjustedStart.getMonth();
            let days = adjustedEnd.getDate() - adjustedStart.getDate();

            if (days < 0) {
                months -= 1;
                const prevMonth = new Date(adjustedEnd.getFullYear(), adjustedEnd.getMonth(), 0);
                days += prevMonth.getDate();
            }

            if (months < 0) {
                years -= 1;
                months += 12;
            }

            const totalMonths = years * 12 + months;
            const totalDays = Math.floor((adjustedEnd - adjustedStart) / oneDay);
            return { totalDays, years, months: totalMonths, days };
        }

                // HEDİYE ÖNERİLERİ

                // AŞK OYUNLARI / TESTLERİ
                if (msg.includes('test') || msg.includes('oyun') || msg.includes('soru') || msg.includes('bilmeceli')) {
                    const gameResponses = [
                        "🎮 AŞK TESTİ başlasın!\n\nEmirhan'a soru 1: Nazlıcan'ın en hoşlandığın özelliği nedir?\n(Cevap: Her şeyi çünkü aşkısın!)\n\nNazlıcan'a soru 1: Emirhan seni hissettirdiği en iyi duygu nedir?\n(Cevap: Güvenlik ve tutkudaaynı anda!)\n\n💯 Puan: %100! 🏆💕",
                        "❓ HANGI ÇİFTİN PARÇASININ? \n\nEğer:\n→ Sadık ve güçlü isen = Emirhan gibisin! 💪❤️\n→ Zeki ve bağımsız isen = Nazlıcan gibisin! ✨🧠\n→ İkisiyolun = EMIRHAN + NAZLICAN'IN KLONÛSÜNSÜNsün! 😂💕\n\nSonuç: Hepniz şanslısınız bu çifte yakın olmakla! 🥰",

                // User mesajını history'ye ekle (mood context ile)
                let moodContext = '';
                if (currentMood === 'romantic') {
                    moodContext = '(Bu soruya romantik ve sevgi dolu şekilde cevap ver)';
                } else if (currentMood === 'funny') {
                    moodContext = '(Bu soruya komik ve eğlenceli şekilde cevap ver, şakasını katmayı unutma!)';
                } else if (currentMood === 'wise') {
                    moodContext = '(Bu soruya bilge ve düşündürücü şekilde cevap ver)';
                } else if (currentMood === 'normal') {
                    moodContext = '(Bu soruya doğal ve dengeli şekilde cevap ver)';
                } else if (currentMood === 'wise') {
                    moodContext = '(Bu soruya bilge ve düşündürücü şekilde cevap ver)';
                }
                
                conversationHistory.push({
                    role: 'user',
                    content: userMessage + ' ' + moodContext
                });

                // History'yi sınırla (son 10 mesajı tut)
                if (conversationHistory.length > 11) { // system + 10 mesaj
                    conversationHistory = [
                        conversationHistory[0], // system prompt'u koru
                        ...conversationHistory.slice(-10) // son 10 mesajı al
                    ];
                }

                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: conversationHistory,
                        temperature: 0.9,
                        max_tokens: 1000,
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    
                    if (response.status === 401) {
                        return "❌ API Key geçersiz! https://console.groq.com/keys adresinden yeni key al.";
                    } else if (response.status === 429) {
                        return "⏳ Çok hızlı sorular soruyorsun. Biraz bekle lütfen!";
                    }
                    
                    return "❌ Groq API Hatası: " + (error.error?.message || 'Hata oluştu');
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // AI cevabını history'ye ekle
                conversationHistory.push({
                    role: 'assistant',
                    content: aiResponse
                });
                
                return aiResponse;

            } catch (error) {
                if (error instanceof TypeError && error.message.includes('Failed to fetch')) {
                    return "❌ İnternet bağlantı hatası veya CORS sorunu. VPN'i kontrol et!";
                }
                return `❌ Hata: ${error.message}`;
            }
        }

        function scrollToBottom() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(text, isUser) {
            const chatContainer = document.getElementById('chatContainer');
            
            // İlk mesajsa empty state'i kaldır
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isUser ? 'user-message' : 'ai-message');
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(textDiv);
            chatContainer.appendChild(messageDiv);
            
            scrollToBottom();
        }

        function showTyping() {
            const chatContainer = document.getElementById('chatContainer');
            const messagDiv = document.createElement('div');
            messagDiv.className = 'message ai-message';
            messagDiv.id = 'typingMessage';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            messagDiv.appendChild(typingDiv);
            chatContainer.appendChild(messagDiv);
            
            scrollToBottom();
        }

        function removeTyping() {
            const typingMessage = document.getElementById('typingMessage');
            if (typingMessage) {
                typingMessage.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userInput = input.value.trim();

            if (!userInput) return;

            // Kullanıcı mesajını ekle
            addMessage(userInput, true);
            saveChatHistory(); // Geçmişe kaydet
            input.value = '';

            // Typing animasyonu göster
            showTyping();

            // AI cevabını al
            const aiResponse = await callGroqAI(userInput);
            removeTyping();
            addMessage(aiResponse, false);
            saveChatHistory(); // Geçmişe kaydet
        }
    </script>
